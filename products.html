<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objekte – Feuerwehrmuseum</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="products-page">

  <header class="top-bar">
    <a href="index.html" class="back-btn">←</a>
    <span class="top-title">Feuerwehrmuseum</span>
  </header>

  <!-- Buttons oben -->
  <div class="action-btns">
    <button class="pill-btn active" id="btn-ar" onclick="openAR()">Im Raum ansehen</button>
    <button class="pill-btn" id="btn-video" onclick="openVideo()">Video ansehen</button>
  </div>

  <!-- Feuerlöscher Anzeige -->
  <div class="model-display">
    <a rel="ar" href="" id="ar-link">
      <img id="model-img" src="Feuerlöscher_Hand.jpg" alt="Feuerlöscher" class="model-img">
    </a>

    <!-- Beschriftungen (sichtbar wenn Beschreibung an) -->
    <div class="label-overlay" id="labels" style="display:none">
      <span class="label" style="top:18%;left:62%">Ventil</span>
      <span class="label" style="top:35%;left:8%">Schlauch</span>
      <span class="label" style="top:55%;left:10%">Etikett</span>
      <span class="label" style="top:60%;left:65%">Behälter</span>
    </div>
  </div>

  <!-- Toggle Buttons -->
  <div class="toggle-row">
    <div class="toggle-item">
      <span class="toggle-label">Beschreibung</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-desc" onchange="toggleDesc(this.checked)">
        <span class="slider-thumb"></span>
      </label>
    </div>
    <a href="detail.html" class="funktionsweise-btn">Funktionsweise</a>
  </div>

  <!-- Epochen Slider -->
  <div class="epoch-bar">
    <button class="epoch-btn active" onclick="setEpoch(this, 'Feuerlöscher_Hand.jpg', 'Feuerlöscher_Hand.usdz')">1920</button>
    <button class="epoch-btn" onclick="setEpoch(this, 'Feuerlöscher_Chrom.jpg', 'Feuerlöscher_Chrom.usdz')">1929</button>
    <button class="epoch-btn" onclick="setEpoch(this, 'Feuerlöscher_Rot.jpg', 'Feuerlöscher_Rot.usdz')">1948</button>
    <button class="epoch-btn" onclick="setEpoch(this, 'Feuerlöscher_Anhang.jpg', 'Feuerlöscher_Anhang.usdz')">1952</button>
    <button class="epoch-btn" onclick="setEpoch(this, 'Feuerlöscher_Blau.jpg', 'Feuerlöscher_Blau.usdz')">1960</button>
  </div>

  <!-- Video Overlay -->
  <div class="overlay" id="video-overlay" style="display:none">
    <div class="overlay-content">
      <button class="overlay-close-btn" onclick="closeVideo()">Video beenden</button>
      <div class="video-placeholder">
        <img src="Feuerlöscher_Hand.jpg" alt="Video" style="width:100%;height:100%;object-fit:cover;opacity:0.5">
        <div class="play-icon">▶</div>
      </div>
    </div>
  </div>

  <script>
    function setEpoch(btn, img, usdz) {
      document.querySelectorAll('.epoch-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('model-img').src = img;
      document.getElementById('ar-link').href = usdz;
    }

    function toggleDesc(on) {
      document.getElementById('labels').style.display = on ? 'block' : 'none';
    }

    function openAR() {
      const link = document.getElementById('ar-link');
      if (link.href && link.href !== window.location.href) {
        link.click();
      }
    }

    function openVideo() {
      document.getElementById('video-overlay').style.display = 'flex';
    }

    function closeVideo() {
      document.getElementById('video-overlay').style.display = 'none';
    }
  </script>

</body>
</html>
